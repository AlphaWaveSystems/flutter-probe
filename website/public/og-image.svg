<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06080d"/>
      <stop offset="100%" stop-color="#0c1018"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3bf0e4"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Border accent line top -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>

  <!-- Logo circle -->
  <circle cx="120" cy="200" r="50" fill="#1a1a2e" stroke="#00d4ff" stroke-width="3"/>
  <text x="120" y="222" font-family="system-ui, -apple-system, sans-serif" font-size="52" font-weight="700" fill="#00d4ff" text-anchor="middle">P</text>

  <!-- Title -->
  <text x="195" y="190" font-family="system-ui, -apple-system, sans-serif" font-size="56" font-weight="800" fill="#d8e0f0">FlutterProbe</text>

  <!-- Subtitle -->
  <text x="195" y="230" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#7889a8">Flutter E2E Testing Framework</text>

  <!-- Main tagline -->
  <text x="80" y="330" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="600" fill="#d8e0f0">Write E2E tests in plain English.</text>
  <text x="80" y="380" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="600" fill="#d8e0f0">Execute with sub-50ms round-trips.</text>

  <!-- Code snippet preview -->
  <rect x="80" y="420" width="500" height="160" rx="12" fill="#121826" stroke="#1e2940" stroke-width="2"/>
  <text x="100" y="455" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="16" fill="#a78bfa">test</text>
  <text x="134" y="455" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="16" fill="#3bf0e4">"user can sign in"</text>
  <text x="110" y="482" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="16" fill="#d8e0f0">open the app</text>
  <text x="110" y="509" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="16" fill="#d8e0f0">tap "Sign In"</text>
  <text x="110" y="536" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="16" fill="#d8e0f0">type "user@test.com" into "Email"</text>
  <text x="110" y="563" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="16" fill="#3bea7e">see "Dashboard"</text>

  <!-- Stats on right side -->
  <text x="700" y="455" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="800" fill="#3bf0e4">&lt;50ms</text>
  <text x="700" y="485" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#7889a8">command round-trip</text>

  <text x="700" y="540" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="800" fill="#3bea7e">0%</text>
  <text x="700" y="570" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#7889a8">WebDriver overhead</text>

  <text x="950" y="455" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="800" fill="#a78bfa">7</text>
  <text x="950" y="485" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#7889a8">migration formats</text>

  <text x="950" y="540" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="800" fill="#d8e0f0">5</text>
  <text x="950" y="570" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#7889a8">cloud device farms</text>

  <!-- Footer -->
  <text x="80" y="610" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#7889a8">github.com/AlphaWaveSystems/flutter-probe</text>
  <text x="1120" y="610" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#7889a8" text-anchor="end">Open Source</text>
</svg>
