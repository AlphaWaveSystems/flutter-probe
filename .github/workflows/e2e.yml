name: E2E Tests

# Runs the full FlutterProbe E2E test suite against the test app on
# real emulators/simulators. Tests are sharded across 3 parallel jobs
# per platform for ~3x speedup.

on:
  workflow_dispatch:
    inputs:
      platform:
        description: "Target platform"
        required: true
        type: choice
        options:
          - android
          - ios
          - both
        default: android
      api-level:
        description: "Android API level (ignored for iOS)"
        required: false
        type: string
        default: "34"
      flutter-version:
        description: "Flutter version"
        required: false
        type: string
        default: "3.41.4"
  push:
    tags: ['v*']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  E2E_REPO: AlphaWaveSystems/e2e-test-workspace
  ANDROID_APP_ID: com.alphawavesystems.probe_test_app
  IOS_BUNDLE_ID: com.alphawavesystems.probeTestApp
  FLUTTER_VERSION: ${{ inputs.flutter-version || '3.41.4' }}
  API_LEVEL: ${{ inputs.api-level || '34' }}

jobs:
  # ---- Android E2E ----
  e2e-android:
    name: Android E2E (API ${{ inputs.api-level || '34' }}, shard ${{ matrix.shard }})
    if: >
      github.event_name == 'push' ||
      inputs.platform == 'android' ||
      inputs.platform == 'both'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: ["1/3", "2/3", "3/3"]
    steps:
      # ── Checkout repos ──
      - name: Checkout FlutterProbe
        uses: actions/checkout@v6

      - name: Checkout E2E test app
        uses: actions/checkout@v6
        with:
          repository: ${{ env.E2E_REPO }}
          path: e2e-app

      # ── Tool setup ──
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      # ── Build probe CLI ──
      - name: Build probe CLI
        run: make build

      # ── Emulator setup ──
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | \
            sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: AVD cache
        uses: actions/cache@v5
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-${{ env.API_LEVEL }}-${{ runner.os }}

      - name: Create AVD
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ env.API_LEVEL }}
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: false
          script: echo "AVD created"

      # ── Build and install test app ──
      - name: Configure probe_agent dependency
        run: |
          cd e2e-app/mobile
          cat > pubspec_overrides.yaml << 'EOF'
          dependency_overrides:
            probe_agent:
              path: ../../probe_agent
          EOF

      - name: Install Flutter dependencies
        run: cd e2e-app/mobile && flutter pub get

      - name: Build debug APK with ProbeAgent
        run: cd e2e-app/mobile && flutter build apk --debug --dart-define=PROBE_AGENT=true

      # ── Run tests inside emulator session ──
      - name: Run E2E tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ env.API_LEVEL }}
          emulator-options: -no-snapshot -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -memory 2048
          disable-animations: true
          script: |
            # Install and launch the test app
            adb install -r e2e-app/mobile/build/app/outputs/flutter-apk/app-debug.apk
            adb logcat -c
            adb shell am start -n ${{ env.ANDROID_APP_ID }}/.MainActivity
            sleep 10

            # Run tests with sharding
            bin/probe test e2e-app/mobile/tests/ \
              --shard ${{ matrix.shard }} \
              --device emulator-5554 \
              --config e2e-app/mobile/tests/probe.yaml \
              --format json \
              --output reports/results-android-shard-${{ strategy.job-index }}.json \
              -v -y \
              || true

      # ── Reports ──
      - name: Generate HTML report
        if: always()
        run: |
          RESULT_FILE="reports/results-android-shard-${{ strategy.job-index }}.json"
          if [ -f "$RESULT_FILE" ]; then
            bin/probe report --input "$RESULT_FILE" -o "reports/report-android-shard-${{ strategy.job-index }}.html"
          fi

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: android-e2e-shard-${{ strategy.job-index }}
          path: reports/
          if-no-files-found: ignore

  # ---- iOS E2E ----
  e2e-ios:
    name: iOS E2E (shard ${{ matrix.shard }})
    if: >
      github.event_name == 'push' ||
      inputs.platform == 'ios' ||
      inputs.platform == 'both'
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        shard: ["1/3", "2/3", "3/3"]
    steps:
      # ── Checkout repos ──
      - name: Checkout FlutterProbe
        uses: actions/checkout@v6

      - name: Checkout E2E test app
        uses: actions/checkout@v6
        with:
          repository: ${{ env.E2E_REPO }}
          path: e2e-app

      # ── Tool setup ──
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable

      # ── Build probe CLI ──
      - name: Build probe CLI
        run: make build

      # ── Boot iOS simulator ──
      - name: Boot iOS simulator
        run: |
          DEVICE=$(xcrun simctl list devices available -j | \
            python3 -c "import json,sys; devs=[d for r in json.load(sys.stdin)['devices'].values() for d in r if 'iPhone' in d['name'] and d['isAvailable']]; print(devs[0]['udid'] if devs else '')")
          if [ -n "$DEVICE" ]; then
            xcrun simctl boot "$DEVICE" || true
            xcrun simctl bootstatus "$DEVICE"
            echo "DEVICE_UDID=$DEVICE" >> "$GITHUB_ENV"
            echo "Booted simulator: $DEVICE"
          else
            echo "No available iPhone simulator found"
            exit 1
          fi

      # ── Build and install test app ──
      - name: Configure probe_agent dependency
        run: |
          cd e2e-app/mobile
          cat > pubspec_overrides.yaml << 'EOF'
          dependency_overrides:
            probe_agent:
              path: ../../probe_agent
          EOF

      - name: Install Flutter dependencies
        run: cd e2e-app/mobile && flutter pub get

      - name: Build iOS simulator app with ProbeAgent
        run: cd e2e-app/mobile && flutter build ios --debug --simulator --dart-define=PROBE_AGENT=true

      - name: Install and launch on simulator
        run: |
          xcrun simctl install "$DEVICE_UDID" e2e-app/mobile/build/ios/iphonesimulator/Runner.app
          xcrun simctl launch "$DEVICE_UDID" ${{ env.IOS_BUNDLE_ID }}
          sleep 5
          echo "App launched on $DEVICE_UDID"

      # ── Run tests ──
      - name: Run E2E tests
        run: |
          bin/probe test e2e-app/mobile/tests/ \
            --shard ${{ matrix.shard }} \
            --device "$DEVICE_UDID" \
            --config e2e-app/mobile/tests/probe.yaml \
            --format json \
            --output reports/results-ios-shard-${{ strategy.job-index }}.json \
            -v -y \
            || true

      # ── Reports ──
      - name: Generate HTML report
        if: always()
        run: |
          RESULT_FILE="reports/results-ios-shard-${{ strategy.job-index }}.json"
          if [ -f "$RESULT_FILE" ]; then
            bin/probe report --input "$RESULT_FILE" -o "reports/report-ios-shard-${{ strategy.job-index }}.html"
          fi

      # ── Cleanup ──
      - name: Shutdown simulator
        if: always()
        run: xcrun simctl shutdown "$DEVICE_UDID" 2>/dev/null || true

      - name: Upload iOS results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ios-e2e-shard-${{ strategy.job-index }}
          path: reports/
          if-no-files-found: ignore
