name: E2E Tests

# Manual trigger only — E2E tests require a Flutter app project with ProbeAgent
# integrated, plus emulator/simulator setup. This workflow serves as a template
# that can be customized per-project.
on:
  workflow_dispatch:
    inputs:
      platform:
        description: "Target platform"
        required: true
        type: choice
        options:
          - android
          - ios
          - both
        default: android
      api-level:
        description: "Android API level (ignored for iOS)"
        required: false
        type: string
        default: "34"
      flutter-version:
        description: "Flutter version"
        required: false
        type: string
        default: "3.41.4"
      test-path:
        description: "Path to test files"
        required: false
        type: string
        default: "tests/"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---- Android E2E ----
  e2e-android:
    name: Android E2E (API ${{ inputs.api-level }})
    if: inputs.platform == 'android' || inputs.platform == 'both'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true

      - name: Build probe CLI
        run: make build

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ inputs.flutter-version }}
          channel: stable
          cache: true

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | \
            sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: AVD cache
        uses: actions/cache@v5
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-${{ inputs.api-level }}-${{ runner.os }}

      - name: Create AVD
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ inputs.api-level }}
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: false
          script: echo "AVD created"

      # TODO: Add your Flutter app build step here.
      # The app must have probe_agent integrated and built with:
      #   flutter build apk --debug --dart-define=PROBE_AGENT=true
      # Then install and launch:
      #   adb install -r build/app/outputs/flutter-apk/app-debug.apk
      #   adb shell am start -n <package>/<activity>

      - name: Run E2E tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ inputs.api-level }}
          emulator-options: -no-snapshot -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: |
            bin/probe test ${{ inputs.test-path }} \
              --format json \
              --output reports/results.json \
              -v -y \
              || true

      - name: Generate HTML report
        if: always()
        run: |
          if [ -f reports/results.json ]; then
            bin/probe report --input reports/results.json -o reports/report.html
          fi

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: android-e2e-results
          path: reports/
          if-no-files-found: ignore

  # ---- iOS E2E ----
  e2e-ios:
    name: iOS E2E
    if: inputs.platform == 'ios' || inputs.platform == 'both'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true

      - name: Build probe CLI
        run: make build

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ inputs.flutter-version }}
          channel: stable

      - name: Boot iOS simulator
        run: |
          DEVICE=$(xcrun simctl list devices available -j | \
            python3 -c "import json,sys; devs=[d for r in json.load(sys.stdin)['devices'].values() for d in r if 'iPhone' in d['name'] and d['isAvailable']]; print(devs[0]['udid'] if devs else '')")
          if [ -n "$DEVICE" ]; then
            xcrun simctl boot "$DEVICE" || true
            echo "DEVICE_UDID=$DEVICE" >> "$GITHUB_ENV"
          else
            echo "No available iPhone simulator found"
            exit 1
          fi

      # TODO: Add your Flutter app build and install steps here.
      # For iOS simulator:
      #   flutter build ios --debug --simulator --dart-define=PROBE_AGENT=true
      #   xcrun simctl install "$DEVICE_UDID" build/ios/iphonesimulator/Runner.app
      #   xcrun simctl launch "$DEVICE_UDID" <bundle-id>

      - name: Run E2E tests
        run: |
          bin/probe test ${{ inputs.test-path }} \
            --device "$DEVICE_UDID" \
            --format json \
            --output reports/ios-results.json \
            -v -y \
            || true

      - name: Generate HTML report
        if: always()
        run: |
          if [ -f reports/ios-results.json ]; then
            bin/probe report --input reports/ios-results.json -o reports/ios-report.html
          fi

      - name: Upload iOS results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ios-e2e-results
          path: reports/
          if-no-files-found: ignore
