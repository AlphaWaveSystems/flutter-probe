name: Publish to pub.dev

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  publish-agent:
    name: Publish flutter_probe_agent
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: dart-lang/setup-dart@v1
      - uses: flutter-actions/setup-flutter@v4
        with:
          channel: stable
      - run: dart pub get
        working-directory: probe_agent
      - run: dart pub publish --dry-run
        working-directory: probe_agent
      - name: Publish
        working-directory: probe_agent
        run: |
          out=$(dart pub publish -f 2>&1); code=$?
          echo "$out"
          echo "$out" | grep -q "already exists" && exit 0
          exit $code

  publish-annotation:
    name: Publish flutter_probe_annotation
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: dart-lang/setup-dart@v1
      - run: dart pub get
        working-directory: probe_annotation
      - run: dart pub publish --dry-run
        working-directory: probe_annotation
      - name: Publish
        working-directory: probe_annotation
        run: |
          out=$(dart pub publish -f 2>&1); code=$?
          echo "$out"
          echo "$out" | grep -q "already exists" && exit 0
          exit $code

  publish-gen:
    name: Publish flutter_probe_gen
    needs: publish-annotation
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: dart-lang/setup-dart@v1
      - run: dart pub get
        working-directory: probe_gen
      - run: dart pub publish --dry-run
        working-directory: probe_gen
      - name: Publish
        working-directory: probe_gen
        run: |
          out=$(dart pub publish -f 2>&1); code=$?
          echo "$out"
          echo "$out" | grep -q "already exists" && exit 0
          exit $code
