name: Publish to pub.dev

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  publish-agent:
    name: Publish flutter_probe_agent
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v7
      - uses: dart-lang/setup-dart@v1
      - uses: flutter-actions/setup-flutter@v4
        with:
          channel: stable
      - run: dart pub get
        working-directory: probe_agent
      - run: dart pub publish --dry-run
        working-directory: probe_agent
      - name: Publish
        working-directory: probe_agent
        run: |
          pkg=$(grep '^name:' pubspec.yaml | awk '{print $2}')
          ver=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          if curl -sf "https://pub.dev/packages/$pkg/versions/$ver" > /dev/null 2>&1; then
            echo "$pkg $ver already published — skipping"
            exit 0
          fi
          dart pub publish -f

  publish-annotation:
    name: Publish flutter_probe_annotation
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v7
      - uses: dart-lang/setup-dart@v1
      - run: dart pub get
        working-directory: probe_annotation
      - run: dart pub publish --dry-run
        working-directory: probe_annotation
      - name: Publish
        working-directory: probe_annotation
        run: |
          pkg=$(grep '^name:' pubspec.yaml | awk '{print $2}')
          ver=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          if curl -sf "https://pub.dev/packages/$pkg/versions/$ver" > /dev/null 2>&1; then
            echo "$pkg $ver already published — skipping"
            exit 0
          fi
          dart pub publish -f

  publish-gen:
    name: Publish flutter_probe_gen
    needs: publish-annotation
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v7
      - uses: dart-lang/setup-dart@v1
      - run: dart pub get
        working-directory: probe_gen
      - run: dart pub publish --dry-run
        working-directory: probe_gen
      - name: Publish
        working-directory: probe_gen
        run: |
          pkg=$(grep '^name:' pubspec.yaml | awk '{print $2}')
          ver=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          if curl -sf "https://pub.dev/packages/$pkg/versions/$ver" > /dev/null 2>&1; then
            echo "$pkg $ver already published — skipping"
            exit 0
          fi
          dart pub publish -f
