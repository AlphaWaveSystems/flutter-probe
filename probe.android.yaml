project:
  name: "Digacel Android"
  app: com.digacel.tae.app.dev

defaults:
  platform: android
  timeout: 30s
  screenshots: on_failure
  video: false

agent:
  port: 48687          # host-side port (different from iOS to allow parallel runs)
  device_port: 48686   # on-device port (what ProbeAgent listens on)
  dial_timeout: 30s
  token_read_timeout: 30s
  reconnect_delay: 3s

device:
  restart_delay: 1s

reports_folder: reports/android
recipes_folder: tests/recipes
